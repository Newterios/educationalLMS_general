# SRE additional services compose file.
#
# Brings up the two extra microservices required to reach the 6+
# microservice count described in the End Term Project spec, plus an
# Nginx frontend acting as the API gateway in front of them.
#
# IMPORTANT: all paths in this file are relative to the **repository
# root** (the directory that contains docker-compose.dev.yml), because
# Compose resolves relative paths against the first `-f` file's
# project directory. Run from the repo root:
#
#   docker compose -p edulmsv2 -f docker-compose.dev.yml \
#       -f sre/docker-compose.sre.yml \
#       --profile services --profile obs up -d --build
#
# Or via the helper Makefile:
#   make -C sre up
#
# NOTE: no top-level `name:` here on purpose — we want both compose
# files to run under the SAME project name (`edulmsv2`) so the
# containers that have `container_name: edulmsv2-...` hardcoded in
# docker-compose.dev.yml do not collide with parallel projects.

services:
  payment:
    build:
      context: ./sre/services/payment
    image: edulms/payment:1.0.0
    container_name: edulms-sre-payment
    environment:
      PORT: "8081"
      FAILURE_RATE: "${PAYMENT_FAILURE_RATE:-0.02}"
      LATENCY_BASELINE_MS: "${PAYMENT_LATENCY_MS:-40}"
    ports:
      - "8081:8081"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/health"]
      interval: 15s
      timeout: 3s
      retries: 3
    networks:
      - edulms-v2-net    # same network as prometheus + the Go services

  user-profile:
    build:
      context: ./sre/services/user-profile
    image: edulms/user-profile:1.0.0
    container_name: edulms-sre-user-profile
    environment:
      PORT: "8082"
    ports:
      - "8082:8082"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/health"]
      interval: 15s
      timeout: 3s
      retries: 3
    networks:
      - edulms-v2-net    # same network as prometheus + the Go services

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: https://sre.aitbek.tech
    environment:
      NEXT_PUBLIC_API_URL: https://sre.aitbek.tech
      NODE_ENV: production
    container_name: edulmsv2-web
    ports:
      - "4000:3000"
    restart: unless-stopped
    networks:
      - edulms-v2-net

  nginx-frontend:
    image: nginx:1.27-alpine
    container_name: edulms-sre-nginx
    volumes:
      - ./sre/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - payment
      - user-profile
      - web
    restart: unless-stopped
    networks:
      - edulms-v2-net    # same network as prometheus + the Go services

  # ── overlay: bolt the SLO alert rules onto the existing Prometheus
  #    container declared by docker-compose.dev.yml so the rules file
  #    pointed at by observability/prometheus.yml actually exists.
  prometheus:
    volumes:
      - ./observability/rules:/etc/prometheus/rules:ro
    networks:
      - edulms-v2-net    # same network as prometheus + the Go services

networks:
  edulms-v2-net:
    name: edulms-v2-net
    external: true   # reuse the network created by docker-compose.dev.yml
