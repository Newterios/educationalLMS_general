apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: edulms
  labels: { app: gateway, tier: edge }
spec:
  selector: { app: gateway }
  ports:
    - name: http
      port: 9080
      targetPort: 9080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: edulms
  labels: { app: gateway, tier: edge }
spec:
  replicas: 2
  selector:
    matchLabels: { app: gateway }
  template:
    metadata:
      labels: { app: gateway, tier: edge }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9080"
    spec:
      containers:
        - name: gateway
          image: edulms/gateway:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9080
              name: http
          env:
            - name: GATEWAY_HTTP_PORT
              value: "9080"
          envFrom:
            - configMapRef: { name: edulms-config }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
---
# Optional Ingress — requires an ingress controller (nginx-ingress, traefik...)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edulms-ingress
  namespace: edulms
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: edulms.local
      http:
        paths:
          - path: /api/payments
            pathType: Prefix
            backend:
              service:
                name: payment
                port: { number: 8081 }
          - path: /api/profiles
            pathType: Prefix
            backend:
              service:
                name: user-profile
                port: { number: 8082 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port: { number: 9080 }
