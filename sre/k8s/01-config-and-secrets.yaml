# Shared configuration & sensitive values for the EduLMS SRE stack.
# In production secrets should be sealed (Sealed Secrets, External Secrets, etc.)
# but here we keep them inline so the lab is reproducible.

apiVersion: v1
kind: ConfigMap
metadata:
  name: edulms-config
  namespace: edulms
data:
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  REDIS_URL: "redis://redis:6379/0"
  NATS_URL: "nats://nats:4222"
  GATEWAY_AUTH_TARGET: "auth:50051"
  GATEWAY_COURSE_TARGET: "course:50052"
  GATEWAY_ASSESSMENT_TARGET: "assessment:50053"
  PAYMENT_FAILURE_RATE: "0.02"
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: Secret
metadata:
  name: edulms-secrets
  namespace: edulms
type: Opaque
stringData:
  POSTGRES_USER: "edulms"
  POSTGRES_PASSWORD: "edulms"
  POSTGRES_DB: "postgres"
  JWT_ACCESS_SECRET: "change-me-access"
  JWT_REFRESH_SECRET: "change-me-refresh"
