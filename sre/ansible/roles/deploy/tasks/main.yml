---
- name: Ensure the application directory exists on the manager
  ansible.builtin.file:
    path: /opt/edulms
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Pull latest code
  ansible.builtin.command:
    cmd: git pull --ff-only
    chdir: /opt/edulms
  register: git_pull
  changed_when: "'Already up to date' not in git_pull.stdout"

- name: Start / update services with Docker Compose
  ansible.builtin.command:
    cmd: >
      docker compose -p edulmsv2
      -f docker-compose.dev.yml
      -f sre/docker-compose.sre.yml
      --profile services --profile obs
      up -d --build --remove-orphans
    chdir: /opt/edulms
  register: compose_up
  changed_when: "'Started' in compose_up.stderr or 'Recreated' in compose_up.stderr"

- name: Restart nginx container to reload config (inode refresh)
  ansible.builtin.command: docker restart edulms-sre-nginx
  changed_when: true

- name: Show running containers
  ansible.builtin.command: docker ps --format "table {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}"
  register: docker_ps
  changed_when: false

- name: Display container summary
  ansible.builtin.debug:
    var: docker_ps.stdout_lines
