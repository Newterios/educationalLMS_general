---
# Monitoring is already part of the swarm stack (see docker-stack.yml).
# This role only verifies endpoints respond and triggers a Prometheus reload.

- name: Wait for Prometheus to be reachable
  ansible.builtin.uri:
    url: "http://{{ ansible_default_ipv4.address }}:9090/-/ready"
    status_code: 200
  register: prom_ready
  retries: 12
  delay: 5
  until: prom_ready.status == 200

- name: Hot-reload Prometheus configuration
  ansible.builtin.uri:
    url: "http://{{ ansible_default_ipv4.address }}:9090/-/reload"
    method: POST
    status_code: [200, 405]

- name: Wait for Grafana to be reachable
  ansible.builtin.uri:
    url: "http://{{ ansible_default_ipv4.address }}:3002/api/health"
    status_code: 200
  register: grafana_ready
  retries: 12
  delay: 5
  until: grafana_ready.status == 200

- name: Report monitoring URLs
  ansible.builtin.debug:
    msg:
      - "Prometheus: http://{{ ansible_default_ipv4.address }}:9090"
      - "Grafana   : http://{{ ansible_default_ipv4.address }}:3002 (admin / admin)"
