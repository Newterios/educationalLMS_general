# Nginx frontend / reverse proxy in front of the SRE microservices.
#
# Routes:
#   /api/payments/*   -> payment service        (port 8081)
#   /api/profiles/*   -> user-profile service   (port 8082)
#   /health           -> Nginx self healthcheck
#   /                 -> static landing page

upstream payment_upstream {
    server payment:8081;
}

upstream user_profile_upstream {
    server user-profile:8082;
}

server {
    listen       80;
    server_name  _;

    # Basic healthcheck used by docker-compose & K8s probes.
    location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok","component":"nginx-frontend"}';
    }

    location /api/payments/ {
        proxy_pass http://payment_upstream/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /api/profiles/ {
        proxy_pass http://user_profile_upstream/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location / {
        add_header Content-Type text/html;
        return 200 '<!doctype html><meta charset="utf-8"><title>EduLMS SRE</title><body style="font-family:system-ui;padding:40px"><h1>EduLMS SRE Edge</h1><p>Nginx reverse proxy is healthy. Try <code>/api/payments/</code> or <code>/api/profiles/</code>.</p></body>';
    }
}
