# Nginx frontend / reverse proxy in front of the SRE microservices.
#
# All traffic enters via host nginx → this container (port 8080).
# Routes:
#   /api/payments/*          -> payment service        (port 8081)
#   /api/profiles/*          -> user-profile service   (port 8082)
#   /api/*                   -> Go gateway             (port 9080)
#   /monitoring/grafana/*    -> Grafana                (port 3000)
#   /monitoring/prometheus/* -> Prometheus             (port 9090)
#   /health                  -> Nginx self healthcheck
#   /                        -> Next.js web frontend   (port 3000)

upstream payment_upstream {
    server payment:8081;
}

upstream user_profile_upstream {
    server user-profile:8082;
}

upstream gateway_upstream {
    server edulmsv2-gateway:9080;
}

upstream web_upstream {
    server sre-web:3000;
}

upstream grafana_upstream {
    server edulmsv2-grafana:3000;
}

upstream prometheus_upstream {
    server edulmsv2-prometheus:9090;
}

server {
    listen       80;
    server_name  _;

    # Basic healthcheck used by docker-compose & K8s probes.
    location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok","component":"nginx-frontend"}';
    }

    # ── SRE microservices ──────────────────────────────────────────────────
    location /api/payments/ {
        proxy_pass http://payment_upstream/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /api/profiles/ {
        proxy_pass http://user_profile_upstream/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /api/ {
        proxy_pass         http://gateway_upstream/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Monitoring ─────────────────────────────────────────────────────────
    # Grafana: pass full path (no URI stripping) so serve_from_sub_path works
    location /monitoring/grafana/ {
        proxy_pass         http://grafana_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # Prometheus: pass full path
    location /monitoring/prometheus/ {
        proxy_pass         http://prometheus_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Frontend ───────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://web_upstream/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
