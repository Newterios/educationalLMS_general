# Nginx frontend / reverse proxy in front of the SRE microservices.
#
# Routes:
#   /api/payments/*   -> payment service        (port 8081)
#   /api/profiles/*   -> user-profile service   (port 8082)
#   /health           -> Nginx self healthcheck
#   /                 -> Next.js web frontend   (port 3000)

upstream payment_upstream {
    server payment:8081;
}

upstream user_profile_upstream {
    server user-profile:8082;
}

upstream web_upstream {
    server edulmsv2-web:3000;
}

server {
    listen       80;
    server_name  _;

    # Basic healthcheck used by docker-compose & K8s probes.
    location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok","component":"nginx-frontend"}';
    }

    location /api/payments/ {
        proxy_pass http://payment_upstream/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /api/profiles/ {
        proxy_pass http://user_profile_upstream/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location / {
        proxy_pass         http://web_upstream/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
