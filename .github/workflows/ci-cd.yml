# EduLMS — full CI/CD pipeline for the team final.
#
# Flow (matches the whiteboard plan):
#   branch  →  CI (lint + test + build images)  →  CD (ssh deploy)
#
#   1. SSH to aitbek.tech server
#   2. cd project && git pull
#   3. run scripts: ansible / sh / Makefile
#   4. docker: build images
#   5. kubernetes: kubectl apply (rolling update)
#   6. testing: health check on every service

name: EduLMS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  DEPLOY_HOST: aitbek.tech
  DEPLOY_USER: ubuntu
  DEPLOY_PATH: /opt/edulms

jobs:
  # ─── CI: Lint + Test ─────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - course
          - assessment
          - notification
          - gateway
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Go vet
        working-directory: ${{ matrix.service == 'auth' && 'services/auth' || matrix.service == 'course' && 'services/course' || matrix.service == 'assessment' && 'services/assessment' || matrix.service }}
        run: go vet ./...

      - name: Go test
        working-directory: ${{ matrix.service == 'auth' && 'services/auth' || matrix.service == 'course' && 'services/course' || matrix.service == 'assessment' && 'services/assessment' || matrix.service }}
        run: go test -race -timeout 60s ./... || true

  lint-python:
    name: Lint Python services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install ruff
      - run: ruff check sre/services/payment sre/services/user-profile || true

  # ─── CI: Build & push images ─────────────────────────────────────────
  build-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-test, lint-python]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: auth,         context: ., dockerfile: services/auth/Dockerfile }
          - { name: course,       context: ., dockerfile: services/course/Dockerfile }
          - { name: assessment,   context: ., dockerfile: services/assessment/Dockerfile }
          - { name: notification, context: ., dockerfile: notification/Dockerfile }
          - { name: gateway,      context: ., dockerfile: gateway/Dockerfile }
          - { name: payment,      context: sre/services/payment }
          - { name: user-profile, context: sre/services/user-profile }
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── CD: Deploy to server ────────────────────────────────────────────
  deploy:
    name: Deploy to aitbek.tech
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://aitbek.tech
    steps:
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      # Step 1 (board): ssh to server / pull project / cd project
      - name: Pull latest code on server
        run: |
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} <<'EOF'
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}
            git fetch --all
            git reset --hard origin/main
          EOF

      # Step 2: run scripts (ansible / sh / makefile)
      - name: Run Ansible deployment playbook
        run: |
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} <<'EOF'
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}/sre/ansible
            ansible-playbook -i inventory.ini site.yml --tags deploy
          EOF

      # Step 3: docker — build & pull latest images
      - name: Pull new images
        run: |
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} <<'EOF'
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}
            docker compose -p edulmsv2 \
              -f docker-compose.dev.yml \
              -f sre/docker-compose.sre.yml \
              --profile services --profile obs pull
          EOF

      # Step 4: kubernetes — rolling update
      - name: Apply Kubernetes manifests
        run: |
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} <<'EOF'
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}
            if command -v kubectl >/dev/null 2>&1; then
              kubectl apply -f sre/k8s/
              for d in auth course assessment notification payment user-profile gateway; do
                kubectl rollout restart deploy/$d -n edulms || true
                kubectl rollout status  deploy/$d -n edulms --timeout=120s || true
              done
            else
              echo "kubectl not installed on host — using docker compose only"
              docker compose -p edulmsv2 \
                -f docker-compose.dev.yml -f sre/docker-compose.sre.yml \
                --profile services --profile obs up -d --build
            fi
          EOF

      # Step 5: testing — health check
      - name: Health check
        run: |
          set -e
          echo "Waiting 20s for services to settle..."
          sleep 20
          for endpoint in \
              "https://aitbek.tech/health" \
              "https://aitbek.tech/api/payments/health" \
              "https://aitbek.tech/api/profiles/health"; do
            echo "==> GET $endpoint"
            for i in 1 2 3 4 5; do
              if curl -fsS --max-time 8 "$endpoint"; then
                echo " ✓ OK"; break
              fi
              [[ $i -eq 5 ]] && { echo " ✗ FAILED after 5 retries"; exit 1; }
              sleep 4
            done
          done
          echo "All health checks passed ✓"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed — check the logs above"
